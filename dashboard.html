<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lab - Dashboard</title>
  <!-- Memuat config.js agar variabel APPS_SCRIPT_URL tersedia -->
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      overflow: hidden;
      padding: 15px;
    }
    
    .container {
      max-width: 100%;
      height: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5bb5 100%);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .header h1 { 
      font-size: 18px; 
      font-weight: 600;
      line-height: 1.3;
    }
    
    .user-info { 
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    
    #userName { font-weight: 600; font-size: 15px; }
    .user-email { font-size: 12px; opacity: 0.9; }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .logout-btn:hover { background: #dc3545; border-color: #dc3545; }
    
    .content { 
      padding: 20px 25px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    
    .welcome-banner {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border-left: 5px solid #1a73e8;
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #0d47a1;
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(26,115,232,0.1);
    }
    .welcome-banner .icon { font-size: 24px; }
    .welcome-banner strong { color: #1a73e8; font-weight: 700; }
    
    .content h2 { font-size: 18px; color: #333; margin-bottom: 5px; }
    
    .role-badge {
      display: inline-block;
      background: #1a73e8;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
      vertical-align: middle;
    }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 15px;
    }
    
    .menu-card {
      background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%);
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: #1a73e8;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
    }
    .menu-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(26,115,232,0.2);
      border-color: #1a73e8;
    }
    .menu-card h3 { margin-bottom: 8px; font-size: 16px; font-weight: 600; }
    .menu-card p { font-size: 13px; opacity: 0.85; line-height: 1.4; }
    .loading-menus { text-align: center; padding: 40px; color: #666; font-style: italic; }

    /* === CSS untuk Tabel Status Pengujian === */
    .status-table-container {
      overflow-x: auto;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .status-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 600px;
    }
    .status-table th {
      background: #1a73e8;
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: 600;
    }
    .status-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      background: white;
    }
    .status-table tr:last-child td { border-bottom: none; }
    
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #666;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 15px;
      transition: background 0.3s;
    }
    .btn-back:hover { background: #444; }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      background: #f9f9f9;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Smart Lab Dashboard<br>Departemen Teknik Material dan Metalurgi</h1>
      <div class="user-info">
        <div id="userName">Loading...</div>
        <div class="user-email" id="userEmail"></div>
        <button class="logout-btn" onclick="prosesLogout()">🚪 Logout</button>
      </div>
    </div>
    
    <div class="content">
      <!-- Banner Selamat Datang -->
      <div class="welcome-banner" id="welcomeBanner">
        <span class="icon">👋</span>
        <span id="welcomeText">Memuat data pengguna...</span>
      </div>

      <!-- Header Menu Utama (Dibungkus div agar bisa disembunyikan) -->
      <div id="menuHeader">
        <h2>Menu Utama <span id="roleBadge" class="role-badge" style="display:none;">Loading...</span></h2>
        <p style="color: #666; font-size: 13px;">Pilih menu yang ingin diakses:</p>
      </div>
      
      <!-- Container Menu Utama -->
      <div id="menuGrid" class="menu-grid">
        <div class="loading-menus">Sedang memuat menu sesuai hak akses...</div>
      </div>

      <!-- === Container View Status Pengujian (Hidden by default) === -->
      <div id="statusView" style="display: none;">
        <button class="btn-back" onclick="link: 'https://sites.google.com/view/smartlab-dtmmits/home'">← Kembali ke Menu Utama</button>
        <!-- ID ditambahkan agar teks bisa diubah dinamis oleh JS -->
        <h2 id="statusViewTitle">Status Pengujian Anda</h2>
        <p id="statusViewDesc" style="color: #666; font-size: 13px; margin-bottom: 10px;">Berikut adalah riwayat pengujian yang terdaftar atas nama Anda:</p>
        
        <div id="statusTableContainer">
          <!-- Tabel akan di-generate di sini oleh JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // 1. Cek sesi
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.replace('index.html');
    }
    
    // 2. Ambil data user
    const name = localStorage.getItem('user_name') || 'Pengguna';
    const email = localStorage.getItem('user_email') || '';
    
    // === BARU: Variabel global untuk menyimpan role user ===
    let currentUserRole = 'Users';
    
    // 3. Tampilkan data di Header
    document.getElementById('userName').textContent = name;
    document.getElementById('userEmail').textContent = email;
    
    // 4. Tampilkan pesan Selamat Datang
    const welcomeMessage = `Selamat Datang <strong>${name}</strong> di Smart Lab DTMM, apabila ada pertanyaan silahkan kontak <strong>Cak Mamet</strong>`;
    document.getElementById('welcomeText').innerHTML = welcomeMessage;
    
    // 5. Definisi Menu berdasarkan Role
    const menuData = {
      'Manajemen': [
        { title: '📊 Monitoring Pengujian', desc: 'Pantau seluruh proses pengujian yang berjalan', action: 'comingSoon' },
        { title: '🔧 Monitoring Alat', desc: 'Status, kondisi, dan jadwal penggunaan alat', action: 'comingSoon' },
        { title: '💰 Rekap Keuangan', desc: 'Laporan pendapatan dan biaya operasional lab', action: 'comingSoon' },
        { title: '📖 Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', action: 'comingSoon' }
      ],
      'Staff': [
        { title: '📝 Status Pengujian', desc: 'Kelola dan update progres sampel pengujian', action: 'loadStatusPengujian' },
        { title: '📊 Monitoring Pengujian', desc: 'Pantau proses pengujian yang sedang aktif', action: 'comingSoon' },
        { title: '🔧 Monitoring Alat', desc: 'Status, kondisi, dan jadwal penggunaan alat', action: 'comingSoon' },
        { title: '📖 Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', action: 'comingSoon' }
      ],
      'Users': [
        { 
          title: '📝 Daftar Pengujian', 
          desc: 'Ajukan permohonan pengujian material baru', 
          link: 'https://forms.gle/Ci3s32NdwZrKcWEX9',
          openInNewTab: true
        },
        { 
          title: '📊 Status Pengujian', 
          desc: 'Cek progres dan hasil sampel pengujian Anda', 
          action: 'loadStatusPengujian' 
        },
        { title: '📖 Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', action: 'comingSoon' }
      ]
    };

    // 6. Fungsi render menu
    function renderMenus(role) {
      // === BARU: Simpan role ke variabel global ===
      currentUserRole = role;
      
      const menuGrid = document.getElementById('menuGrid');
      const roleBadge = document.getElementById('roleBadge');
      
      roleBadge.textContent = role;
      roleBadge.style.display = 'inline-block';
      
      const menus = menuData[role] || menuData['Users'];
      menuGrid.innerHTML = '';
      
      menus.forEach(menu => {
        const card = document.createElement('div');
        card.className = 'menu-card';
        card.innerHTML = `<h3>${menu.title}</h3><p>${menu.desc}</p>`;
        
        card.addEventListener('click', function(e) {
          e.preventDefault();
          
          if (menu.action === 'loadStatusPengujian') {
            loadStatusPengujian();
          } else if (menu.action === 'comingSoon') {
            alert('Fitur ini sedang dalam pengembangan (Coming Soon).');
          } else if (menu.link && menu.link !== '#') {
            if (menu.openInNewTab) {
              window.open(menu.link, '_blank', 'noopener,noreferrer');
            } else {
              window.location.href = menu.link;
            }
          }
        });
        
        menuGrid.appendChild(card);
      });
    }

    // === Fungsi Load Status Pengujian ===
    function loadStatusPengujian() {
      // Sembunyikan menu, header menu, dan banner selamat datang
      document.getElementById('menuGrid').style.display = 'none';
      document.getElementById('menuHeader').style.display = 'none';
      document.getElementById('welcomeBanner').style.display = 'none';
      
      // Tampilkan view status
      document.getElementById('statusView').style.display = 'block';
      
      // === BARU: Ubah judul dan deskripsi berdasarkan role ===
      const statusTitle = document.getElementById('statusViewTitle');
      const statusDesc = document.getElementById('statusViewDesc');
      
      if (currentUserRole === 'Manajemen' || currentUserRole === 'Staff') {
        statusTitle.textContent = 'Monitoring Status Pengujian';
        statusDesc.textContent = 'Berikut adalah seluruh data riwayat pengujian di laboratorium:';
      } else {
        statusTitle.textContent = 'Status Pengujian Anda';
        statusDesc.textContent = 'Berikut adalah riwayat pengujian yang terdaftar atas nama Anda:';
      }
      
      const container = document.getElementById('statusTableContainer');
      container.innerHTML = '<p style="text-align:center; padding: 30px; color: #666;">⏳ Memuat data pengujian...</p>';
      
      // === BARU: Tambahkan parameter &role ke URL fetch ===
      const fetchUrl = `${APPS_SCRIPT_URL}?action=getStatus&email=${encodeURIComponent(email)}&role=${encodeURIComponent(currentUserRole)}`;
      
      fetch(fetchUrl)
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            if (!data.data || data.data.length === 0) {
              // === BARU: Pesan kosong yang berbeda berdasarkan role ===
              const emptyMsg = (currentUserRole === 'Users') 
                ? 'Anda belum mengajukan pengujian atau data sedang diproses.' 
                : 'Belum ada data pengujian yang tercatat di sistem.';
                
              container.innerHTML = `
                <div class="empty-state">
                  <div style="font-size: 40px; margin-bottom: 10px;">📭</div>
                  <strong>Tidak ada data ditemukan</strong><br>
                  <span style="font-size: 13px;">${emptyMsg}</span>
                </div>`;
              return;
            }
            
            // Bangun Tabel HTML
            let html = '<div class="status-table-container"><table class="status-table"><thead><tr>';
            
            // Header Tabel
            data.headers.forEach(header => {
              html += `<th>${header}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            // Isi Tabel
            data.data.forEach(row => {
              html += '<tr>';
              row.forEach(cell => {
                // Format jika cell adalah objek Date dari Google Sheets
                let displayValue = cell;
                if (cell && typeof cell === 'object' && cell.toString().includes('T')) {
                  displayValue = new Date(cell).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                }
                html += `<td>${displayValue}</td>`;
              });
              html += '</tr>';
            });
            
            html += '</tbody></table></div>';
            container.innerHTML = html;
            
          } else {
            container.innerHTML = `<div class="empty-state" style="color: #dc3545;">⚠️ Gagal memuat data: ${data.error}</div>`;
          }
        })
        .catch(error => {
          console.error("Error:", error);
          container.innerHTML = '<div class="empty-state" style="color: #dc3545;">⚠️ Terjadi kesalahan koneksi. Silakan coba lagi.</div>';
        });
    }

    // === Fungsi Kembali ke Menu Utama ===
    function showMainMenu() {
      // Tampilkan kembali semua elemen yang disembunyikan
      document.getElementById('statusView').style.display = 'none';
      document.getElementById('menuGrid').style.display = 'grid';
      document.getElementById('menuHeader').style.display = 'block';
      document.getElementById('welcomeBanner').style.display = 'flex';
    }
    
    // 7. Fetch Role dari Apps Script saat load
    if (email) {
      const fetchUrl = `${APPS_SCRIPT_URL}?action=getRole&email=${encodeURIComponent(email)}`;
      fetch(fetchUrl)
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            renderMenus(data.role);
          } else {
            renderMenus('Users');
          }
        })
        .catch(error => {
          console.error("Error fetching role:", error);
          renderMenus('Users');
        });
    } else {
      renderMenus('Users');
    }
    
    // 8. Fungsi logout
    function prosesLogout() {
      localStorage.clear();
      window.location.replace('index.html');
    }
  </script>
</body>
</html>
