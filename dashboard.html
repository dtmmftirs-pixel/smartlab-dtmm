<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lab - Dashboard</title>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      overflow: hidden;
      padding: 15px;
    }
    
    .container {
      max-width: 100%;
      height: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5bb5 100%);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .header h1 { 
      font-size: 18px; 
      font-weight: 600;
      line-height: 1.3;
    }
    
    .user-info { 
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    
    #userName { font-weight: 600; font-size: 15px; }
    .user-email { font-size: 12px; opacity: 0.9; }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .logout-btn:hover { background: #dc3545; border-color: #dc3545; }
    
    .content { 
      padding: 20px 25px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    
    .welcome-banner {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border-left: 5px solid #1a73e8;
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #0d47a1;
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(26,115,232,0.1);
    }
    .welcome-banner .icon { font-size: 24px; }
    .welcome-banner strong { color: #1a73e8; font-weight: 700; }
    
    .content h2 { font-size: 18px; color: #333; margin-bottom: 5px; }
    
    .role-badge {
      display: inline-block;
      background: #1a73e8;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
      vertical-align: middle;
    }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 15px;
    }
    
    .menu-card {
      background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%);
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: #1a73e8;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
    }
    .menu-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(26,115,232,0.2);
      border-color: #1a73e8;
    }
    .menu-card h3 { margin-bottom: 8px; font-size: 16px; font-weight: 600; }
    .menu-card p { font-size: 13px; opacity: 0.85; line-height: 1.4; }
    .loading-menus { text-align: center; padding: 40px; color: #666; font-style: italic; }

    /* === CSS untuk Tabel Status Pengujian === */
    .status-table-container {
      overflow-x: auto;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .status-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 800px;
    }
    .status-table th {
      background: #1a73e8;
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: 600;
    }
    .status-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      background: white;
    }
    .status-table tr:last-child td { border-bottom: none; }
    
    /* === EDITABLE CELLS === */
    .editable-cell {
      cursor: pointer;
      position: relative;
    }
    
    .editable-cell:hover {
      background: #fff3cd !important;
      outline: 2px dashed #ffc107;
    }
    
    .editable-cell select {
      width: 100%;
      padding: 6px;
      border: 2px solid #1a73e8;
      border-radius: 4px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }
    
    .save-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .save-btn:hover { background: #218838; }
    .save-btn:disabled { background: #ccc; cursor: not-allowed; }
    
    .edit-hint {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      font-style: italic;
    }
    
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #666;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 15px;
      transition: background 0.3s;
    }
    .btn-back:hover { background: #444; }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      background: #f9f9f9;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Smart Lab Dashboard<br>Departemen Teknik Material dan Metalurgi</h1>
      <div class="user-info">
        <div id="userName">Loading...</div>
        <div class="user-email" id="userEmail"></div>
        <button class="logout-btn" onclick="prosesLogout()">🚪 Logout</button>
      </div>
    </div>
    
    <div class="content">
      <div class="welcome-banner" id="welcomeBanner">
        <span class="icon">👋</span>
        <span id="welcomeText">Memuat data pengguna...</span>
      </div>

      <div id="menuHeader">
        <h2>Menu Utama <span id="roleBadge" class="role-badge" style="display:none;">Loading...</span></h2>
        <p style="color: #666; font-size: 13px;">Pilih menu yang ingin diakses:</p>
      </div>
      
      <div id="menuGrid" class="menu-grid">
        <div class="loading-menus">Sedang memuat menu sesuai hak akses...</div>
      </div>

      <div id="statusView" style="display: none;">
        <button class="btn-back" onclick="showMainMenu()">← Kembali ke Menu Utama</button>
        <h2 id="statusViewTitle">Status Pengujian Anda</h2>
        <p id="statusViewDesc" style="color: #666; font-size: 13px; margin-bottom: 10px;">Berikut adalah riwayat pengujian yang terdaftar atas nama Anda:</p>
        
        <div id="statusTableContainer"></div>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.replace('index.html');
    }
    
    const name = localStorage.getItem('user_name') || 'Pengguna';
    const email = localStorage.getItem('user_email') || '';
    let currentUserRole = 'User';
    
    document.getElementById('userName').textContent = name;
    document.getElementById('userEmail').textContent = email;
    
    const welcomeMessage = `Selamat Datang <strong>${name}</strong> di Smart Lab DTMM, apabila ada pertanyaan silahkan kontak <strong>Cak Mamet</strong>`;
    document.getElementById('welcomeText').innerHTML = welcomeMessage;
    
    const menuData = {
      'Manajemen': [
        { title: '📊 Monitoring Pengujian', desc: 'Pantau seluruh proses pengujian yang berjalan', action: 'comingSoon' },
        { title: ' Monitoring Alat', desc: 'Status, kondisi, dan jadwal penggunaan alat', action: 'comingSoon' },
        { title: '💰 Rekap Keuangan', desc: 'Laporan pendapatan dan biaya operasional lab', action: 'comingSoon' },
        { title: ' Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', action: 'comingSoon' }
      ],
      'Staff': [
        { title: '📝 Status Pengujian', desc: 'Kelola dan update progres sampel pengujian', action: 'loadStatusPengujian' },
        { title: '📊 Monitoring Pengujian', desc: 'Pantau proses pengujian yang sedang aktif', action: 'comingSoon' },
        { title: ' Monitoring Alat', desc: 'Status, kondisi, dan jadwal penggunaan alat', action: 'comingSoon' },
        { title: '📖 Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', action: 'comingSoon' }
      ],
      'User': [
        { 
          title: '📝 Daftar Pengujian', 
          desc: 'Ajukan permohonan pengujian material baru', 
          link: 'https://forms.gle/Ci3s32NdwZrKcWEX9',
          openInNewTab: true
        },
        { 
          title: '📊 Status Pengujian', 
          desc: 'Cek progres dan hasil sampel pengujian Anda', 
          action: 'loadStatusPengujian' 
        },
        { title: '📖 Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', action: 'comingSoon' }
      ]
    };

    function renderMenus(role) {
      if (role !== 'Staff' && role !== 'Manajemen') {
        role = 'User';
      }
      
      currentUserRole = role;
      
      const menuGrid = document.getElementById('menuGrid');
      const roleBadge = document.getElementById('roleBadge');
      
      roleBadge.textContent = role;
      roleBadge.style.display = 'inline-block';
      
      const menus = menuData[role] || menuData['User'];
      menuGrid.innerHTML = '';
      
      menus.forEach(menu => {
        const card = document.createElement('div');
        card.className = 'menu-card';
        card.innerHTML = `<h3>${menu.title}</h3><p>${menu.desc}</p>`;
        
        card.addEventListener('click', function(e) {
          e.preventDefault();
          
          if (menu.action === 'loadStatusPengujian') {
            loadStatusPengujian();
          } else if (menu.action === 'comingSoon') {
            alert('Fitur ini sedang dalam pengembangan (Coming Soon).');
          } else if (menu.link && menu.link !== '#') {
            if (menu.openInNewTab) {
              window.open(menu.link, '_blank', 'noopener,noreferrer');
            } else {
              window.location.href = menu.link;
            }
          }
        });
        
        menuGrid.appendChild(card);
      });
    }

    function loadStatusPengujian() {
      document.getElementById('menuGrid').style.display = 'none';
      document.getElementById('menuHeader').style.display = 'none';
      document.getElementById('welcomeBanner').style.display = 'none';
      
      document.getElementById('statusView').style.display = 'block';
      
      const statusTitle = document.getElementById('statusViewTitle');
      const statusDesc = document.getElementById('statusViewDesc');
      
      if (currentUserRole === 'Manajemen' || currentUserRole === 'Staff') {
        statusTitle.textContent = 'Monitoring Status Pengujian';
        statusDesc.textContent = 'Berikut adalah seluruh data riwayat pengujian di laboratorium:';
      } else {
        statusTitle.textContent = 'Status Pengujian Anda';
        statusDesc.textContent = 'Berikut adalah riwayat pengujian yang terdaftar atas nama Anda:';
      }
      
      const container = document.getElementById('statusTableContainer');
      container.innerHTML = '<p style="text-align:center; padding: 30px; color: #666;">⏳ Memuat data pengujian...</p>';
      
      const fetchUrl = `${APPS_SCRIPT_URL}?action=getStatus&email=${encodeURIComponent(email)}&role=${encodeURIComponent(currentUserRole)}`;
      
      fetch(fetchUrl)
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            if (!data.data || data.data.length === 0) {
              const emptyMsg = (currentUserRole === 'User') 
                ? 'Anda belum mengajukan pengujian atau data sedang diproses.' 
                : 'Belum ada data pengujian yang tercatat di sistem.';
                
              container.innerHTML = `
                <div class="empty-state">
                  <div style="font-size: 40px; margin-bottom: 10px;"></div>
                  <strong>Tidak ada data ditemukan</strong><br>
                  <span style="font-size: 13px;">${emptyMsg}</span>
                </div>`;
              return;
            }
            
            // Bangun Tabel HTML dengan fitur edit
            let html = '<div class="status-table-container"><table class="status-table"><thead><tr>';
            
            data.headers.forEach((header, index) => {
              html += `<th>${header}</th>`;
            });
            
            // Tambah kolom Aksi untuk Staff/Manajemen
            if (currentUserRole === 'Manajemen' || currentUserRole === 'Staff') {
              html += '<th>Aksi</th>';
            }
            html += '</tr></thead><tbody>';
            
            data.data.forEach((row, rowIndex) => {
              const sheetRowIndex = rowIndex + 2; // +2 karena header dan Google Sheet 1-based
              html += `<tr data-row="${sheetRowIndex}">`;
              
              row.forEach((cell, colIndex) => {
                const sheetColIndex = colIndex + 1;
                let displayValue = cell;
                
                // Format tanggal
                if (cell && typeof cell === 'object' && cell.toString().includes('T')) {
                  displayValue = new Date(cell).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                }
                
                // Tentukan kolom yang bisa diedit (kolom E, F, G = Status)
                const isEditable = (currentUserRole === 'Manajemen' || currentUserRole === 'Staff') && 
                                   (sheetColIndex === 5 || sheetColIndex === 6 || sheetColIndex === 7);
                
                if (isEditable) {
                  const headerName = data.headers[colIndex] || '';
                  let options = [];
                  
                  // Tentukan options berdasarkan nama kolom
                  if (headerName.toLowerCase().includes('terima sampel')) {
                    options = ['Belum', 'Sudah'];
                  } else if (headerName.toLowerCase().includes('pembayaran')) {
                    options = ['Belum', 'Sudah', 'Lunas'];
                  } else if (headerName.toLowerCase().includes('pengujian')) {
                    options = ['Pending', 'Dalam Proses', 'Selesai', 'Dibatalkan'];
                  } else {
                    options = ['Belum', 'Sudah'];
                  }
                  
                  let selectHTML = `<select class="status-select" data-row="${sheetRowIndex}" data-col="${sheetColIndex}" data-original="${cell}">`;
                  options.forEach(opt => {
                    const selected = (opt === cell) ? 'selected' : '';
                    selectHTML += `<option value="${opt}" ${selected}>${opt}</option>`;
                  });
                  selectHTML += `</select>`;
                  
                  html += `<td class="editable-cell">${selectHTML}</td>`;
                } else {
                  html += `<td>${displayValue}</td>`;
                }
              });
              
              if (currentUserRole === 'Manajemen' || currentUserRole === 'Staff') {
                html += `<td><button class="save-btn" onclick="saveRow(${sheetRowIndex})" disabled>💾 Simpan</button></td>`;
              }
              html += '</tr>';
            });
            
            html += '</tbody></table></div>';
            
            if (currentUserRole === 'Manajemen' || currentUserRole === 'Staff') {
              html += `<div class="edit-hint">💡 <strong>Tips:</strong> Ubah nilai dropdown pada kolom status, lalu klik tombol "Simpan" untuk menyimpan perubahan ke Google Sheet.</div>`;
            }
            
            container.innerHTML = html;
            
          } else {
            container.innerHTML = `<div class="empty-state" style="color: #dc3545;">⚠️ Gagal memuat data: ${data.error}</div>`;
          }
        })
        .catch(error => {
          console.error("Error:", error);
          container.innerHTML = '<div class="empty-state" style="color: #dc3545;">⚠️ Terjadi kesalahan koneksi. Silakan coba lagi.</div>';
        });
    }

    // === Fungsi Simpan Row ===
    function saveRow(rowIndex) {
      const tr = document.querySelector(`tr[data-row="${rowIndex}"]`);
      if (!tr) return;
      
      const saveBtn = tr.querySelector('.save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = ' Menyimpan...';
      
      // Kumpulkan semua perubahan di row ini
      const selects = tr.querySelectorAll('.status-select');
      const updates = [];
      
      selects.forEach(select => {
        const col = parseInt(select.getAttribute('data-col'));
        const newValue = select.value;
        const originalValue = select.getAttribute('data-original');
        
        // Hanya update jika nilai berubah
        if (newValue !== originalValue) {
          updates.push({
            col: col,
            newValue: newValue
          });
        }
      });
      
      if (updates.length === 0) {
        alert('ℹ️ Tidak ada perubahan yang dilakukan');
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Simpan';
        return;
      }
      
      // Kirim ke Apps Script
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'updateStatus',
          rowIndex: parseInt(rowIndex),
          updates: updates,
          userEmail: email,
          userRole: currentUserRole
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          alert('✅ Data berhasil disimpan!');
          tr.style.background = '#d4edda';
          setTimeout(() => { tr.style.background = ''; }, 2000);
          
          // Update data-original
          selects.forEach(select => {
            select.setAttribute('data-original', select.value);
          });
        } else {
          alert('❌ Gagal menyimpan: ' + data.error);
          tr.style.background = '#f8d7da';
        }
      })
      .catch(error => {
        console.error("Error:", error);
        alert('❌ Terjadi kesalahan koneksi');
      })
      .finally(() => {
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Simpan';
      });
    }

    function showMainMenu() {
      document.getElementById('statusView').style.display = 'none';
      document.getElementById('menuGrid').style.display = 'grid';
      document.getElementById('menuHeader').style.display = 'block';
      document.getElementById('welcomeBanner').style.display = 'flex';
    }
    
    if (email) {
      const fetchUrl = `${APPS_SCRIPT_URL}?action=getRole&email=${encodeURIComponent(email)}`;
      fetch(fetchUrl)
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            renderMenus(data.role);
          } else {
            renderMenus('User');
          }
        })
        .catch(error => {
          console.error("Error fetching role:", error);
          renderMenus('User');
        });
    } else {
      renderMenus('User');
    }
    
    function prosesLogout() {
      localStorage.clear();
      window.location.replace('index.html');
    }
  </script>
</body>
</html>
