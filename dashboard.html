<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lab - Dashboard</title>
  <!-- Memuat config.js agar variabel APPS_SCRIPT_URL tersedia -->
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      overflow: hidden;
      padding: 15px;
    }
    
    .container {
      max-width: 100%;
      height: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5bb5 100%);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .header h1 { 
      font-size: 18px; 
      font-weight: 600;
      line-height: 1.3;
    }
    
    .user-info { 
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    
    #userName {
      font-weight: 600;
      font-size: 15px;
    }
    
    .user-email { 
      font-size: 12px; 
      opacity: 0.9; 
    }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .logout-btn:hover { 
      background: #dc3545; 
      border-color: #dc3545;
    }
    
    .content { 
      padding: 20px 25px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    
    .welcome-banner {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border-left: 5px solid #1a73e8;
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #0d47a1;
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(26,115,232,0.1);
    }
    
    .welcome-banner .icon { font-size: 24px; }
    .welcome-banner strong { color: #1a73e8; font-weight: 700; }
    
    .content h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 5px;
    }
    
    .role-badge {
      display: inline-block;
      background: #1a73e8;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
      vertical-align: middle;
    }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 15px;
    }
    
    .menu-card {
      background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%);
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: #1a73e8;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .menu-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(26,115,232,0.2);
      border-color: #1a73e8;
    }
    
    .menu-card h3 { 
      margin-bottom: 8px; 
      font-size: 16px;
      font-weight: 600;
    }
    
    .menu-card p { 
      font-size: 13px; 
      opacity: 0.85;
      line-height: 1.4;
    }

    .loading-menus {
      text-align: center;
      padding: 40px;
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Smart Lab Dashboard<br>Departemen Teknik Material dan Metalurgi</h1>
      <div class="user-info">
        <div id="userName">Loading...</div>
        <div class="user-email" id="userEmail"></div>
        <button class="logout-btn" onclick="prosesLogout()">🚪 Logout</button>
      </div>
    </div>
    
    <div class="content">
      <div class="welcome-banner" id="welcomeBanner">
        <span class="icon">👋</span>
        <span id="welcomeText">Memuat data pengguna...</span>
      </div>

      <h2>Menu Utama <span id="roleBadge" class="role-badge" style="display:none;">Loading...</span></h2>
      <p style="color: #666; font-size: 13px;">Pilih menu yang ingin diakses:</p>
      
      <!-- Container menu yang akan diisi secara dinamis oleh JavaScript -->
      <div id="menuGrid" class="menu-grid">
        <div class="loading-menus">Sedang memuat menu sesuai hak akses...</div>
      </div>
    </div>
  </div>

  <script>
    // 1. Cek sesi
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.replace('index.html');
    }
    
    // 2. Ambil data user dari localStorage
    const name = localStorage.getItem('user_name') || 'Pengguna';
    const email = localStorage.getItem('user_email') || '';
    
    // 3. Tampilkan data di Header
    document.getElementById('userName').textContent = name;
    document.getElementById('userEmail').textContent = email;
    
    // 4. Tampilkan pesan Selamat Datang
    const welcomeMessage = `Selamat Datang <strong>${name}</strong> di Smart Lab DTMM, apabila ada pertanyaan silahkan kontak <strong>Cak Mamet</strong>`;
    document.getElementById('welcomeText').innerHTML = welcomeMessage;
    
    // 5. Definisi Menu berdasarkan Role
    const menuData = {
      'Manajemen': [
        { title: '📊 Monitoring Pengujian', desc: 'Pantau seluruh proses pengujian yang berjalan', link: '#' },
        { title: '🔧 Monitoring Alat', desc: 'Status, kondisi, dan jadwal penggunaan alat', link: '#' },
        { title: '💰 Rekap Keuangan', desc: 'Laporan pendapatan dan biaya operasional lab', link: '#' },
        { title: '📖 Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', link: '#' }
      ],
      'Staff': [
        { title: '📝 Status Pengujian', desc: 'Kelola dan update progres sampel pengujian', link: '#' },
        { title: '📊 Monitoring Pengujian', desc: 'Pantau proses pengujian yang sedang aktif', link: '#' },
        { title: '🔧 Monitoring Alat', desc: 'Status, kondisi, dan jadwal penggunaan alat', link: '#' },
        { title: '📖 Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', link: '#' }
      ],
      'Users': [
        { 
          title: '📝 Daftar Pengujian', 
          desc: 'Ajukan permohonan pengujian material baru', 
          url: 'https://forms.gle/Ci3s32NdwZrKcWEX9',
          forceNewTab: true // Flag khusus untuk memaksa buka tab baru
        },
        { title: '📊 Status Pengujian', desc: 'Cek progres dan hasil sampel pengujian Anda', link: '#' },
        { title: '📖 Katalog Lab', desc: 'Lihat katalog lengkap pengujian dan harga', link: '#' }
      ]
    };

    // 6. Fungsi untuk merender menu ke HTML
    function renderMenus(role) {
      const menuGrid = document.getElementById('menuGrid');
      const roleBadge = document.getElementById('roleBadge');
      
      // Tampilkan badge role
      roleBadge.textContent = role;
      roleBadge.style.display = 'inline-block';
      
      // Ambil array menu sesuai role (fallback ke 'Users' jika role tidak dikenali)
      const menus = menuData[role] || menuData['Users'];
      
      // Bersihkan loading text
      menuGrid.innerHTML = '';
      
      // Generate HTML untuk setiap menu
      menus.forEach(menu => {
        const card = document.createElement('a');
        card.href = menu.link;
        card.className = 'menu-card';
        card.innerHTML = `
          <h3>${menu.title}</h3>
          <p>${menu.desc}</p>
        `;
        menuGrid.appendChild(card);
      });
    }

    // 7. Fetch Role dari Google Apps Script
    if (email) {
      // Pastikan APPS_SCRIPT_URL sudah didefinisikan di config.js
      const fetchUrl = `${APPS_SCRIPT_URL}?action=getRole&email=${encodeURIComponent(email)}`;
      
      fetch(fetchUrl)
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            console.log("Role pengguna:", data.role);
            renderMenus(data.role);
          } else {
            console.warn("Gagal mendapatkan role, menggunakan default 'Users'");
            renderMenus('Users');
          }
        })
        .catch(error => {
          console.error("Error fetching role:", error);
          // Fallback ke Users jika terjadi error jaringan
          renderMenus('Users');
        });
    } else {
      renderMenus('Users');
    }
    
    // 8. Fungsi logout
    function prosesLogout() {
      localStorage.clear();
      window.location.replace('index.html');
    }
  </script>
</body>
</html>
