<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lab - Dashboard Staff</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5bb5 100%);
      color: white;
      padding: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; }
    .user-info { text-align: right; }
    .user-email { font-size: 14px; opacity: 0.9; }
    .content { padding: 30px; }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .menu-card {
      background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%);
      padding: 25px;
      border-radius: 12px;
      text-decoration: none;
      color: #1a73e8;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    .menu-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(26,115,232,0.2);
      border-color: #1a73e8;
    }
    .menu-card h3 { margin-bottom: 10px; font-size: 18px; }
    .menu-card p { font-size: 14px; opacity: 0.8; }
    .logout-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    .logout-btn:hover { background: #c82333; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>👨‍ Smart Lab Dashboard</h1>
      <div class="user-info">
        <div id="userName"></div>
        <div class="user-email" id="userEmail"></div>
      </div>
    </div>
    
    <div class="content">
      <h2>Menu Staff</h2>
      <p style="color: #666; margin-top: 5px;">Pilih menu yang ingin diakses:</p>
      
      <div class="menu-grid">
        <!--
        <a href="chatbot.html" class="menu-card">
          <h3>💬 Chatbot Asisten</h3>
          <p>Akses chatbot untuk customer</p>
        </a>
        -->
        <a href="#" class="menu-card">
          <h3>📊 Dashboard Pengujian</h3>
          <p>Lihat status pengujian (Coming Soon)</p>
        </a>
        
        <a href="#" class="menu-card">
          <h3>📝 Daftar Pengujian</h3>
          <p>Kelola pengajuan pengujian (Coming Soon)</p>
        </a>
        
        <a href="#" class="menu-card">
          <h3>📖 Katalog Lab</h3>
          <p>Lihat katalog lengkap (Coming Soon)</p>
        </a>
      </div>
      
      <div style="margin-top: 30px; text-align: center;">
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <script>
    // Cek login
    if (!localStorage.getItem('g_token')) {
      window.location.href = 'index.html';
    }
    
    // Tampilkan info user
    const email = localStorage.getItem('user_email');
    const name = localStorage.getItem('user_name');
    document.getElementById('userName').textContent = name || 'User';
    document.getElementById('userEmail').textContent = email || '';
    
    function logout() {
      localStorage.removeItem('g_token');
      localStorage.removeItem('user_email');
      localStorage.removeItem('user_name');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
