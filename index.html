<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lab - Login</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    
    .container {
      max-width: 450px;
      width: 100%;
      padding: 40px 35px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }
    
    h1 { 
      color: #1a73e8; 
      margin-bottom: 15px; 
      font-size: 28px; 
      font-weight: 700;
      text-align: center;
    }
    
    .subtitle { 
      color: #666; 
      margin-bottom: 30px; 
      font-size: 15px; 
      line-height: 1.6;
      text-align: center;
    }
    
    .g_id_signin { 
      margin: 25px auto;
      display: flex;
      justify-content: center;
    }
    
    .divider {
      margin: 30px 0;
      border-top: 2px solid #eee;
      position: relative;
      text-align: center;
    }
    
    .divider-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 0 15px;
      color: #999;
      font-size: 14px;
      font-weight: 600;
    }
    
    .btn-chat {
      display: inline-block;
      width: 100%;
      padding: 15px 25px;
      background: linear-gradient(135deg, #28a745 0%, #218838 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      text-align: center;
    }
    
    .btn-chat:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(40,167,69,0.4);
    }

    /* --- TAMBAHAN: Loading Overlay --- */
    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      display: none; /* Tersembunyi secara default */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .spinner {
      width: 45px;
      height: 45px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #1a73e8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-height: 700px) {
      .container { padding: 30px 25px; }
      h1 { font-size: 24px; margin-bottom: 12px; }
      .subtitle { font-size: 14px; margin-bottom: 25px; }
    }
    
    @media (max-width: 480px) {
      .container { padding: 30px 20px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="color: #1a73e8; font-weight: 600; font-size: 16px;">Memverifikasi hak akses...</p>
    <p style="color: #666; font-size: 13px; margin-top: 5px;">Mohon tunggu sebentar</p>
  </div>

  <div class="container">
    <h1>Smart Lab - Login</h1>
    <p class="subtitle">
      Autentikasi Smart Lab <br>
      Departemen Teknik Material & Metalurgi ITS
    </p>
    
    <!-- Konfigurasi Google Sign-In -->
    <div id="g_id_onload"
         data-client_id="96706539653-e1h205ej3ne8uhmehl6nfe4bdhgkimm2.apps.googleusercontent.com"
         data-callback="handleLogin"
         data-ux_mode="popup">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-text="signin_with"
         data-theme="outline">
    </div>
    
    <div class="divider">
      <span class="divider-text"></span>
    </div>
    
    <!-- Ganti href="#" menjadi href="widget.html" jika file chatbot sudah ada -->
    <a href="#" class="btn-chat">💬 Manfaatkan <strong>Smart Lab Assistant</strong></a>
  </div>

  <!-- Opsional: Jika config.js sudah berisi SCRIPT_URL, Anda bisa menghapus baris const di bawah -->
  <script src="config.js"></script>
  
  <script>
    // ⚠️ PENTING: Ganti dengan URL Deployment Web App Google Apps Script Anda
    // Jika URL sudah didefinisikan di config.js, hapus atau comment baris ini.
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx...GANTI_DENGAN_URL_ANDA.../exec';

    // Fungsi untuk decode JWT Google dengan aman (mendukung karakter UTF-8 / Base64URL)
    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(
        atob(base64)
          .split('')
          .map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          })
          .join('')
      );
      return JSON.parse(jsonPayload);
    }

    function handleLogin(response) {
      try {
        // 1. Decode payload untuk mendapatkan data user secara aman
        const payload = parseJwt(response.credential);
        const email = payload.email || 'Email tidak tersedia';
        const name = payload.name || 'Pengguna';
        
        // 2. Simpan data dasar user ke localStorage
        localStorage.setItem('g_token', response.credential);
        localStorage.setItem('user_email', email);
        localStorage.setItem('user_name', name);
        localStorage.setItem('isLoggedIn', 'true');
        
        // 3. Tampilkan loading overlay
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        // 4. Fetch role dan menu dari Google Apps Script
        fetch(`${SCRIPT_URL}?action=getUserRole&email=${encodeURIComponent(email)}`)
          .then(res => res.json())
          .then(data => {
            if (data.success) {
              // Simpan role dan menu yang didapat dari backend
              localStorage.setItem('user_role', data.user.role);
              localStorage.setItem('user_menus', JSON.stringify(data.menus));
            } else {
              // Fallback jika user tidak ditemukan di sheet (anggap sebagai 'users' biasa)
              console.warn("User tidak ditemukan di sheet, menggunakan role default.");
              localStorage.setItem('user_role', 'users');
            }
            
            // 5. Redirect ke dashboard setelah data tersimpan
            window.location.href = 'dashboard.html';
          })
          .catch(err => {
            console.error("Gagal menghubungi server untuk verifikasi role:", err);
            // Fallback aman agar user tidak terjebak di halaman login
            localStorage.setItem('user_role', 'users');
            window.location.href = 'dashboard.html';
          });
        
      } catch (error) {
        console.error("Gagal memproses login:", error);
        alert("Terjadi kesalahan saat memproses login. Silakan coba lagi.");
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }
    
    window.onload = function() {
      // Cek apakah user sudah login sebelumnya berdasarkan flag isLoggedIn
      if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.href = 'dashboard.html';
      }
    };
  </script>
</body>
</html>
