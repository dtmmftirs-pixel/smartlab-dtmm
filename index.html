<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lab - Login </title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    
    .container {
      max-width: 450px;
      width: 100%;
      padding: 40px 35px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    h1 { 
      color: #1a73e8; 
      margin-bottom: 15px; 
      font-size: 28px; 
      font-weight: 700;
      text-align: center;
    }
    
    .subtitle { 
      color: #666; 
      margin-bottom: 30px; 
      font-size: 15px; 
      line-height: 1.6;
      text-align: center;
    }
    
    .g_id_signin { 
      margin: 25px auto;
      display: flex;
      justify-content: center;
    }
    
    .divider {
      margin: 30px 0;
      border-top: 2px solid #eee;
      position: relative;
      text-align: center;
    }
    
    .divider-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 0 20px;
      color: #999;
      font-size: 14px;
    }
    
    .btn-chat {
      display: inline-block;
      width: 100%;
      padding: 15px 25px;
      background: linear-gradient(135deg, #28a745 0%, #218838 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      text-align: center;
    }
    
    .btn-chat:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(40,167,69,0.4);
    }
    
    @media (max-height: 700px) {
      .container { padding: 30px 25px; }
      h1 { font-size: 24px; margin-bottom: 12px; }
      .subtitle { font-size: 14px; margin-bottom: 25px; }
    }
    
    @media (max-width: 480px) {
      .container { padding: 30px 20px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Smart Lab - Login</h1>
    <p class="subtitle">
      Authentikasi Smart Lab <br>
      Departemen Teknik Material & Metalurgi ITS<br>
    </p>
    
    <div id="g_id_onload"
         data-client_id="96706539653-e1h205ej3ne8uhmehl6nfe4bdhgkimm2.apps.googleusercontent.com"
         data-callback="handleLogin"
         data-ux_mode="popup">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-text="signin_with">
    </div>
    
    <div class="divider">
      <span class="divider-text"></span>
    </div>
    
    <a href="widget.html" class="btn-chat">💬 Manfaatkan <strong>Smart Lab Assistant</strong></a>
  </div>

  <script src="config.js"></script>
  <script>
    function handleLogin(response) {
      // 1. Simpan token
      localStorage.setItem('g_token', response.credential);
      
      // 2. Decode payload untuk mendapatkan data user
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      
      // 3. Simpan data user ke localStorage
      localStorage.setItem('user_email', payload.email);
      localStorage.setItem('user_name', payload.name);
      
      // 4. ✅ SET FLAG LOGIN BERHASIL (DITAMBAHKAN DI SINI)
      localStorage.setItem('isLoggedIn', 'true');
      
      // 5. Redirect ke dashboard
      window.location.href = 'dashboard.html';
    }
    
    window.onload = function() {
      // ✅ Cek apakah user sudah login sebelumnya berdasarkan flag isLoggedIn
      if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.href = 'dashboard.html';
      }
    };
  </script>
</body>
</html>
