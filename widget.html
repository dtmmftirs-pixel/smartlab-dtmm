<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Lab Chat Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: transparent;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Tombol Chat Floating */
    .chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a73e8 0%, #0d5bb5 100%);
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(26,115,232,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    
    .chat-button:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 25px rgba(26,115,232,0.6);
    }
    
    .chat-button.hidden {
      display: none;
    }
    
    /* Container Chat Widget */
    .chat-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 340px;
      height: calc(100vh - 120px);
      max-height: 580px;
      min-height: 380px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    
    .chat-widget.minimized {
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }
    
    /* Header Widget */
    .widget-header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5bb5 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .widget-header h3 {
      font-size: 15px;
      font-weight: 600;
    }
    
    .widget-header p {
      font-size: 11px;
      opacity: 0.9;
      margin-top: 2px;
    }
    
    .minimize-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    
    .minimize-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    
    /* Chat Box */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #f8f9fa;
      min-height: 180px;
    }
    
    .message {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
      line-height: 1.5;
      font-size: 13px;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      background: #1a73e8;
      color: white;
      margin-left: auto;
    }
    
    .message.bot {
      background: white;
      border: 1px solid #ddd;
    }
    
    .message strong { font-weight: 700; color: inherit; }
    .message em { font-style: italic; }
    
    .message code {
      background: rgba(0,0,0,0.1);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
    }
    
    .message.bot code { background: rgba(0,0,0,0.05); }
    .message.user code { background: rgba(255,255,255,0.2); }

    /* Styling untuk pesan "Sedang berpikir" */
    .thinking-message {
      background: white;
      border: 1px solid #ddd;
      opacity: 0.8;
    }

    .thinking-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .thinking-dots span {
      width: 7px;
      height: 7px;
      background: #1a73e8;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
    .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* Input Area */
    .input-area {
      padding: 12px;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 8px;
      background: white;
    }
    
    .input-area input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    
    .input-area input:focus { border-color: #1a73e8; }
    
    .input-area button {
      padding: 9px 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s ease;
    }
    
    .input-area button:hover { background: #0d5bb5; }
    .input-area button:disabled { background: #ccc; cursor: not-allowed; }
    
    /* Welcome Message */
    .welcome-msg {
      background: white;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    
    .welcome-msg strong { color: #1a73e8; }
    
    /* Responsive */
    @media (max-width: 480px) {
      .chat-widget {
        width: 100%;
        height: 100%;
        bottom: 0;
        right: 0;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <!-- Tombol Chat Floating (Ditambahkan icon 💬) -->
  <button class="chat-button" id="chatButton" onclick="toggleChat()">
    💬
  </button>
  
  <!-- Widget Chat -->
  <div class="chat-widget minimized" id="chatWidget">
    <div class="widget-header">
      <div>
        <h3>💬 Cak Mamet - Smart Lab Assistant</h3>
        <p>Teknik Material & Metalurgi ITS</p>
      </div>
      <button class="minimize-btn" onclick="toggleChat()">−</button>
    </div>
    
    <div class="chat-box" id="chatBox">
      <div class="welcome-msg">
        <strong>Halo! 👋</strong><br><br>
        Saya Cak Mamet, asisten virtual Smart Lab.<br>
        Departemen Teknik Material dan Metalurgi<br>
        Silakan bertanya tentang fasilitas pengujian yang kami miliki.
      </div>
    </div>
    
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ketik pertanyaan..." onkeypress="handleEnter(event)">
      <button id="sendBtn" onclick="kirimPesan()">Kirim</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    let chatHistory = [];
    let isChatOpen = false;
    
    function toggleChat() {
      const widget = document.getElementById('chatWidget');
      const button = document.getElementById('chatButton');
      isChatOpen = !isChatOpen;
      
      if (isChatOpen) {
        widget.classList.remove('minimized');
        button.classList.add('hidden');
      } else {
        widget.classList.add('minimized');
        button.classList.remove('hidden');
      }
    }
    
    function handleEnter(event) {
      if (event.key === 'Enter') {
        kirimPesan();
      }
    }

    function markdownToHtml(text) {
      if (!text) return '';
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      text = text.replace(/`(.*?)`/g, '<code style="background:rgba(0,0,0,0.1);padding:2px 6px;border-radius:3px;">$1</code>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }
    
    function tampilkanPesanSedangBerpikir() {
      const chatBox = document.getElementById('chatBox');
      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'message bot thinking-message';
      thinkingDiv.id = 'thinking-' + Date.now();
      
      thinkingDiv.innerHTML = `
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="thinking-dots">
            <span></span><span></span><span></span>
          </div>
          <span style="font-style: italic; color: #666;">Sedang berpikir</span>
        </div>
      `;
      
      chatBox.appendChild(thinkingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      return thinkingDiv.id;
    }

    function hapusPesanSedangBerpikir(id) {
      const thinkingElement = document.getElementById(id);
      if (thinkingElement) {
        thinkingElement.remove();
      }
    }
    
    function kirimPesan() {
      const input = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const pesan = input.value.trim();
      
      if (!pesan) return;
      
      console.log("Mengirim pesan:", pesan);
      
      tampilkanPesan(pesan, 'user');
      input.value = '';
      
      sendBtn.disabled = true;
      sendBtn.textContent = '...';
      
      chatHistory.push({ role: 'user', text: pesan });
      const thinkingId = tampilkanPesanSedangBerpikir();
      
      // PERBAIKAN: Gunakan APPS_SCRIPT_URL (dari config.js) dan metode GET
      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set('action', 'chat');
      url.searchParams.set('message', pesan);
      url.searchParams.set('history', JSON.stringify(chatHistory.slice(-6)));
      
      fetch(url.toString(), {
        method: 'GET'
      })
      .then(response => response.text())
      .then(text => {
        hapusPesanSedangBerpikir(thinkingId);
        
        try {
          const data = JSON.parse(text);
          if (data.success) {
            tampilkanPesan(data.reply, 'bot');
            chatHistory.push({ role: 'bot', text: data.reply });
          } else {
            tampilkanPesan('⚠️ Error: ' + (data.error || 'Gagal memproses'), 'bot');
          }
        } catch (e) {
          console.error('Parse error:', e, 'Raw text:', text);
          tampilkanPesan('⚠️ Maaf, format respons tidak dikenali.', 'bot');
        }
      })
      .catch(error => {
        console.error('Fetch error:', error);
        hapusPesanSedangBerpikir(thinkingId);
        tampilkanPesan('⚠️ Maaf, terjadi kesalahan koneksi.', 'bot');
      })
      .finally(() => {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Kirim';
      });
    }
    
    function tampilkanPesan(teks, pengirim) {
      const chatBox = document.getElementById('chatBox');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message ' + pengirim;
      messageDiv.innerHTML = markdownToHtml(teks);
      chatBox.appendChild(messageDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    setTimeout(() => {
      if (!isChatOpen) {
        toggleChat();
      }
    }, 2000);
  </script>
</body>
</html>
